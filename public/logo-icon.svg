<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="beam" x1="64" y1="285" x2="448" y2="285" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="0.12" stop-color="#f59e0b"/>
      <stop offset="0.88" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- T letterform -->
  <!-- Horizontal bar -->
  <rect x="88" y="120" width="336" height="56" rx="12" fill="white"/>
  <!-- Vertical stem -->
  <rect x="208" y="120" width="96" height="280" rx="12" fill="white"/>

  <!-- Scan beam - layered glow effect -->
  <rect x="44" y="264" width="424" height="42" rx="21" fill="#f59e0b" opacity="0.06"/>
  <rect x="52" y="270" width="408" height="30" rx="15" fill="#f59e0b" opacity="0.1"/>
  <rect x="60" y="278" width="392" height="14" rx="7" fill="#f59e0b" opacity="0.2"/>
  <rect x="64" y="281" width="384" height="8" rx="4" fill="url(#beam)"/>

  <!-- Scan endpoint - left -->
  <circle cx="76" cy="285" r="12" fill="#f59e0b"/>

  <!-- Scan endpoint - right with pulse rings -->
  <circle cx="436" cy="285" r="12" fill="#f59e0b"/>
  <circle cx="436" cy="285" r="18" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.35"/>
  <circle cx="436" cy="285" r="24" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.15"/>
</svg>
